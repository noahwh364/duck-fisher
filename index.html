<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Duck Fisher</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b1020;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Portrait game frame, centered; letterboxed on wide screens. */
      #game {
        position: relative;
        height: 100%;
        aspect-ratio: 9 / 16;
        max-width: 100%;
        background: #0b1020;
        overflow: hidden;
      }
      #game canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: absolute;
        top: env(safe-area-inset-top, 12px);
        left: 0;
        right: 0;
        text-align: center;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        font-weight: 700;
        font-size: 20px;
        text-shadow: 0 2px 6px rgba(0,0,0,0.6);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game">
        <div id="hud">Ducks caught: <span id="score">0</span></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
